services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exportaciones
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exportaciones"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/exportaciones
      LOG_LEVEL: INFO
    volumes:
      - ${DATA_DIR:-../}:/data:ro
      - etl_logs:/app/logs
    # ETL es un job one-shot, no reinicia automáticamente
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/exportaciones
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  postgres_data:
  etl_logs:
